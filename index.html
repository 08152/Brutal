<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS ENGINE GLB</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#crosshair{
position:absolute;
top:50%;left:50%;
width:10px;height:10px;
transform:translate(-50%,-50%);
border:2px solid black;
border-radius:50%;
pointer-events:none;
}

#hud{
position:absolute;
top:10px;left:10px;
font-family:monospace;
background:rgba(255,255,255,0.4);
padding:10px;
}

#ammo{
position:absolute;
bottom:10px;right:10px;
font-family:monospace;
font-size:20px;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="hud"></div>
<div id="ammo"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/loaders/GLTFLoader.js";

/* =========================
   BASIC SETUP
========================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.HemisphereLight(0xffffff,0x444444));

/* FLOOR */
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x228822})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* =========================
   INPUT
========================= */

let move = {w:0,a:0,s:0,d:0};

document.addEventListener("keydown", e=>{
if(e.key==="w") move.w=1;
if(e.key==="s") move.s=1;
if(e.key==="a") move.a=1;
if(e.key==="d") move.d=1;
if(e.key===" ") jump();
});

document.addEventListener("keyup", e=>{
if(e.key==="w") move.w=0;
if(e.key==="s") move.s=0;
if(e.key==="a") move.a=0;
if(e.key==="d") move.d=0;
});

/* MOUSE LOOK */
let yaw=0,pitch=0;

document.body.addEventListener("click", ()=>document.body.requestPointerLock());

document.addEventListener("mousemove", e=>{
if(document.pointerLockElement!==document.body) return;
yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;
pitch=Math.max(-1.5,Math.min(1.5,pitch));
});

/* =========================
   PHYSICS
========================= */

let velocity = new THREE.Vector3();
let onGround = true;

function jump(){
if(onGround){
velocity.y=0.2;
onGround=false;
}
}

/* =========================
   SOUND
========================= */

const shootSound = new Audio("sounds/shoot.mp3");
const reloadSound = new Audio("sounds/reload.mp3");

function playShoot(){
shootSound.currentTime=0;
shootSound.play();
}

function playReload(){
reloadSound.currentTime=0;
reloadSound.play();
}

/* =========================
   GLB LOADER SYSTEM
========================= */

const loader = new GLTFLoader();
const cache = {};

function loadGLB(path, cb){

if(cache[path]){
cb(cache[path].clone());
return;
}

loader.load(path,(gltf)=>{
cache[path]=gltf.scene;
cb(gltf.scene.clone());
});

}

/* =========================
   ONE LINE SPAWN SYSTEM
========================= */

function spawn(model, x,y,z,scale=1){

loadGLB("models/"+model+".glb",(obj)=>{
obj.position.set(x,y,z);
obj.scale.set(scale,scale,scale);
scene.add(obj);
});

}

/* =========================
   WEAPON (ONLY ONE)
========================= */

let weapon;

loadGLB("models/weapon.glb",(obj)=>{
weapon=obj;
weapon.position.set(0.3,-0.3,-0.8);
camera.add(weapon);
});

/* =========================
   SHOOT SYSTEM
========================= */

const raycaster = new THREE.Raycaster();

let ammo=30;
let maxAmmo=30;
let reloading=false;

/* ENEMY LIST */
const enemies=[];

/* DAMAGE */
function damage(e,amt){
e.hp-=amt;
if(e.hp<=0){
scene.remove(e);
}
}

/* SHOOT */
function shoot(){

if(reloading||ammo<=0) return;

ammo--;
playShoot();

raycaster.setFromCamera(new THREE.Vector2(0,0),camera);

const hits=raycaster.intersectObjects(enemies,true);

if(hits.length){
damage(hits[0].object.parent||hits[0].object,10);
}
}

/* RELOAD */
function reload(){
if(reloading) return;
reloading=true;
playReload();

setTimeout(()=>{
ammo=maxAmmo;
reloading=false;
},1200);
}

/* INPUT */
document.addEventListener("mousedown",e=>{
if(e.button===0) shoot();
if(e.button===2) reload();
});

/* =========================
   ENEMY SYSTEM
========================= */

function spawnEnemy(x,y,z){
loadGLB("models/enemy.glb",(obj)=>{
obj.position.set(x,y,z);
obj.hp=100;
scene.add(obj);
enemies.push(obj);
});
}

/* AI */
function updateAI(){

for(let e of enemies){

const dir=new THREE.Vector3().subVectors(camera.position,e.position).normalize();
e.position.add(dir.multiplyScalar(0.02));

if(e.position.distanceTo(camera.position)<1.5){
camera.position.y-=0.02;
}
}
}

/* =========================
   MOVEMENT
========================= */

function updatePlayer(){

const speed=0.08;

if(move.w) camera.position.z-=Math.cos(yaw)*speed;
if(move.s) camera.position.z+=Math.cos(yaw)*speed;
if(move.a) camera.position.x-=Math.sin(yaw)*speed;
if(move.d) camera.position.x+=Math.sin(yaw)*speed;

/* gravity */
camera.position.y+=velocity.y;
velocity.y-=0.01;

if(camera.position.y<=2){
camera.position.y=2;
velocity.y=0;
onGround=true;
}
}

/* CAMERA */
function updateCamera(){
camera.rotation.order="YXZ";
camera.rotation.y=yaw;
camera.rotation.x=pitch;
}

/* =========================
   LOOP
========================= */

function animate(){
requestAnimationFrame(animate);

updatePlayer();
updateAI();
updateCamera();

renderer.render(scene,camera);
}
animate();

/* =========================
   WORLD SPAWNS
========================= */

spawn("barrier",0,0,-5,1);
spawn("barrier",3,0,-8,1);

spawnEnemy(5,1,-10);
spawnEnemy(-5,1,-15);

</script>

</body>
</html>
