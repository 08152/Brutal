<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FULL FPS SYSTEM</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; font-family:Arial; }

#coords{
  position:absolute;
  bottom:10px;
  right:10px;
  color:white;
  font-size:13px;
  background:rgba(0,0,0,0.4);
  padding:6px;
  border-radius:6px;
  white-space:pre;
}

#healthBar{
  position:absolute;
  bottom:10px;
  left:10px;
  width:220px;
  height:18px;
  border:2px solid white;
  background:rgba(0,0,0,0.3);
}

#healthFill{
  width:100%;
  height:100%;
  background:#1e90ff;
}
</style>
</head>

<body>

<div id="coords"></div>
<div id="healthBar"><div id="healthFill"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87cfff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= PLAYER =================
const player=new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2.2,0);

// ================= GROUND =================
const tex=new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/terrain/grasslight-big.jpg"
);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
tex.repeat.set(50,50);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({map:tex})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ================= INPUT =================
const keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= LOOK =================
let yaw=0,pitch=0;

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement!==document.body)return;

yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;

pitch=Math.max(-1.2,Math.min(1.2,pitch));

player.rotation.y=yaw;
camera.rotation.x=pitch;
});

document.body.onclick=()=>document.body.requestPointerLock();

// ================= GRAVITY =================
let velY=0,onGround=true;

function gravity(){
velY-=0.015;
player.position.y+=velY;
if(player.position.y<=0){
player.position.y=0;
velY=0;
onGround=true;
}
}

window.addEventListener("keydown",(e)=>{
if(e.code==="Space" && onGround){
velY=0.25;
onGround=false;
}
});

// ================= MODEL SYSTEM (ONE LINE SPAWN) =================
const loader=new THREE.GLTFLoader();

let models=[];
let collidables=[];

function addModel(url,x,y,z,scale=1){

loader.load(url,(gltf)=>{

const obj=gltf.scene;

obj.position.set(x,y,z);
obj.scale.set(scale,scale,scale);
obj.updateMatrixWorld(true);

scene.add(obj);

// REAL HITBOX (MESH BASED)
obj.traverse((c)=>{
if(c.isMesh){
c.geometry.computeBoundingBox();
c.updateMatrixWorld(true);
}
});

models.push(obj);
collidables.push(obj);

});
}

// ================= EXAMPLES =================
addModel("barrier.glb",0,-50,0,1);
addModel("barrier.glb",-20,-50,0,1.2);
addModel("barrier.glb",14.8,-41.7,0,1);
addModel("barrier.glb",27.36,-75.47,0,1);

// ================= MOVE =================
function move(){

const speed=0.15;

let dir=new THREE.Vector3();
if(keys["w"])dir.z-=1;
if(keys["s"])dir.z+=1;
if(keys["a"])dir.x-=1;
if(keys["d"])dir.x+=1;

dir.normalize();

const forward=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y=0;forward.normalize();

const right=new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

const move=new THREE.Vector3();
move.addScaledVector(forward,dir.z*speed);
move.addScaledVector(right,dir.x*speed);

const next=player.position.clone().add(move);

// ================= HITBOX CHECK =================
const playerBox=new THREE.Box3().setFromCenterAndSize(
new THREE.Vector3(next.x,next.y+1,next.z),
new THREE.Vector3(0.8,2,0.8)
);

let blocked=false;

for(let m of collidables){

const box=new THREE.Box3().setFromObject(m);

if(playerBox.intersectsBox(box)){
blocked=true;
break;
}

}

if(!blocked) player.position.copy(next);
}

// ================= WEAPON =================
let weapon;

const shootSound=new Audio("shoot.mp3");
const reloadSound=new Audio("reload.mp3");

loader.load("weapon.glb",(gltf)=>{
weapon=gltf.scene;
camera.add(weapon);
weapon.position.set(0.5,-0.9,-1.2);
});

// ================= SHOOT =================
const raycaster=new THREE.Raycaster();

function shoot(){

shootSound.currentTime=0;
shootSound.play();

if(weapon){
const light=new THREE.PointLight(0xffaa00,2,6);
weapon.add(light);
light.position.set(0,0,-1);
setTimeout(()=>weapon.remove(light),50);
}
}

// ================= ADS =================
let aiming=false;

window.addEventListener("mousedown",(e)=>{
if(e.button===2)aiming=true;
if(e.button===0)shoot();
});

window.addEventListener("mouseup",e=>{
if(e.button===2)aiming=false;
});

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
gravity();

// camera height smooth
camera.position.y+=(2.2+player.position.y-camera.position.y)*0.15;

// ADS
const targetFov=aiming?28:75;
camera.fov+=(targetFov-camera.fov)*0.15;
camera.updateProjectionMatrix();

// weapon smooth
if(weapon){
weapon.position.lerp(
aiming?
new THREE.Vector3(0,-0.35,-0.45):
new THREE.Vector3(0.5,-0.9,-1.2),
0.15
);
}

// HUD
document.getElementById("coords").innerText=
`X:${player.position.x.toFixed(2)}
Y:${player.position.y.toFixed(2)}
Z:${player.position.z.toFixed(2)}`;

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
