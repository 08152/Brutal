<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS CORE</title>

<style>
body{margin:0;overflow:hidden;background:#87cfff;font-family:Arial}
#coords{
position:absolute;bottom:10px;right:10px;
background:rgba(0,0,0,0.4);
color:#fff;padding:6px;border-radius:6px;font-size:13px;
white-space:pre;
}
#health{position:absolute;bottom:10px;left:10px;width:200px;height:18px;border:2px solid #fff}
#healthFill{width:100%;height:100%;background:#1e90ff}
</style>
</head>

<body>

<div id="coords"></div>
<div id="health"><div id="healthFill"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87cfff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= PLAYER =================
const player=new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2.2,0);

// ================= TEXTURES =================
const tex=new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/terrain/grasslight-big.jpg"
);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
tex.repeat.set(50,50);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({map:tex})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ================= INPUT =================
const keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= LOOK =================
let yaw=0,pitch=0;
document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement!==document.body)return;
yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
pitch=Math.max(-1.2,Math.min(1.2,pitch));
player.rotation.y=yaw;
camera.rotation.x=pitch;
});
document.body.onclick=()=>document.body.requestPointerLock();

// ================= PHYSICS =================
let velY=0,onGround=true;

function gravity(){
velY-=0.015;
player.position.y+=velY;
if(player.position.y<=0){player.position.y=0;velY=0;onGround=true;}
}

window.addEventListener("keydown",(e)=>{
if(e.code==="Space"&&onGround){
velY=0.25;
onGround=false;
}
});

// ================= GLB COLLISION (REAL MESH RAYCAST) =================
const loader=new THREE.GLTFLoader();
let colliders=[];

function loadBarrier(x,y,z,file="barrier.glb"){
loader.load(file,(gltf)=>{
const obj=gltf.scene;
obj.position.set(x,y,z);
scene.add(obj);

// store mesh triangles
obj.traverse(c=>{
if(c.isMesh) colliders.push(c);
});
});
}

// YOUR POSITIONS
loadBarrier(0,-50,0);
loadBarrier(-20,-50,0);
loadBarrier(-15,-37,0);
addModel("brick.glb", -11, 0, -25, 1);
addModel("brick.glb", 1, 0, -26.50, 1);
addModel("brick.glb", 13, 0, -25, 1);
// ================= MOVE =================
const ray=new THREE.Raycaster();

function move(){
const speed=0.15;

let dir=new THREE.Vector3();
if(keys["w"])dir.z-=1;
if(keys["s"])dir.z+=1;
if(keys["a"])dir.x-=1;
if(keys["d"])dir.x+=1;
dir.normalize();

const forward=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y=0;forward.normalize();

const right=new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

const moveVec=new THREE.Vector3();
moveVec.addScaledVector(forward,dir.z*speed);
moveVec.addScaledVector(right,dir.x*speed);

const next=player.position.clone().add(moveVec);

// 🔥 slope + wall detection
ray.set(next.clone().add(new THREE.Vector3(0,2,0)),new THREE.Vector3(0,-1,0));

const hits=ray.intersectObjects(colliders,true);

if(hits.length){
const h=hits[0].point.y;
next.y=h;
player.position.copy(next);
}else{
player.position.copy(next);
}
}

// ================= WEAPON =================
let weapon;
const shootSound=new Audio("shoot.mp3");
const reloadSound=new Audio("reload.mp3");

loader.load("weapon.glb",(gltf)=>{
weapon=gltf.scene;
camera.add(weapon);
weapon.position.set(0.5,-0.9,-1.2);
});

// ================= SHOOT =================
function muzzle(){
if(!weapon)return;
const light=new THREE.PointLight(0xffaa00,2,6);
weapon.add(light);
light.position.set(0,0,-1);
setTimeout(()=>weapon.remove(light),50);
}

function shoot(){
shootSound.currentTime=0;
shootSound.play();
muzzle();
}

// ================= ADS =================
let aiming=false;

window.addEventListener("mousedown",(e)=>{
if(e.button===2)aiming=true;
if(e.button===0)shoot();
});
window.addEventListener("mouseup",e=>{
if(e.button===2)aiming=false;
});

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
gravity();

// camera smooth height
const targetY=2.2+player.position.y;
camera.position.y+=(targetY-camera.position.y)*0.15;

// ADS (no zoom bug)
const targetFov=aiming?30:75;
camera.fov+=(targetFov-camera.fov)*0.15;
camera.updateProjectionMatrix();

// weapon position
if(weapon){
weapon.position.lerp(
aiming?
new THREE.Vector3(0,-0.35,-0.45):
new THREE.Vector3(0.5,-0.9,-1.2),
0.15
);
}

// HUD
document.getElementById("coords").innerText=
`X:${player.position.x.toFixed(2)}
Y:${player.position.y.toFixed(2)}
Z:${player.position.z.toFixed(2)}`;

renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
