<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS ENGINE SOUND</title>

<style>
body { margin: 0; overflow: hidden; background: #87cfff; }

#crosshair{
position:absolute;
top:50%;left:50%;
width:10px;height:10px;
transform:translate(-50%,-50%);
border:2px solid black;
border-radius:50%;
pointer-events:none;
}

#hud{
position:absolute;
top:10px;
left:10px;
font-family:monospace;
background:rgba(255,255,255,0.4);
padding:10px;
}

#ammo{
position:absolute;
bottom:10px;
right:10px;
font-family:monospace;
font-size:20px;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="hud"></div>
<div id="ammo"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

/* =========================
   BASIC SETUP
========================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

/* FLOOR */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({ color: 0x228822 })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* =========================
   PLAYER LOOK
========================= */

let yaw = 0;
let pitch = 0;

document.body.addEventListener("click", ()=>document.body.requestPointerLock());

document.addEventListener("mousemove", (e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

/* =========================
   GUN
========================= */

const gun = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,0.2,0.8),
  new THREE.MeshBasicMaterial({ color: 0x222222 })
);
gun.position.set(0.3,-0.3,-0.8);
camera.add(gun);
scene.add(camera);

/* =========================
   SOUND SYSTEM (MP3)
========================= */

const shootSound = new Audio("shoot.mp3");
const reloadSound = new Audio("reload.mp3");

function playShoot(){
  shootSound.currentTime = 0;
  shootSound.play();
}

function playReload(){
  reloadSound.currentTime = 0;
  reloadSound.play();
}

/* =========================
   SHOOT SYSTEM
========================= */

const raycaster = new THREE.Raycaster();

let ammo = 30;
let maxAmmo = 30;
let reloading = false;

/* SHOOT */
function shoot(){

  if(reloading) return;
  if(ammo <= 0) return;

  ammo--;
  playShoot();

  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);

  const hits = raycaster.intersectObjects(scene.children, true);

  if(hits.length > 0){
    const obj = hits[0].object;
    obj.material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  }
}

/* RELOAD */
function reload(){

  if(reloading) return;
  reloading = true;

  playReload();

  setTimeout(()=>{
    ammo = maxAmmo;
    reloading = false;
  }, 1200);
}

/* INPUT */
document.addEventListener("mousedown", (e)=>{
  if(e.button === 0) shoot();
  if(e.button === 2) reload();
});

/* =========================
   MOVEMENT
========================= */

let move = {w:0,a:0,s:0,d:0};

document.addEventListener("keydown", e=>{
  if(e.key==="w") move.w=1;
  if(e.key==="s") move.s=1;
  if(e.key==="a") move.a=1;
  if(e.key==="d") move.d=1;
});

document.addEventListener("keyup", e=>{
  if(e.key==="w") move.w=0;
  if(e.key==="s") move.s=0;
  if(e.key==="a") move.a=0;
  if(e.key==="d") move.d=0;
});

/* =========================
   HUD
========================= */

const hud = document.getElementById("hud");
const ammoUI = document.getElementById("ammo");

/* =========================
   LOOP
========================= */

function animate(){
  requestAnimationFrame(animate);

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  hud.innerHTML = `
  X:${camera.position.x.toFixed(2)}<br>
  Y:${camera.position.y.toFixed(2)}<br>
  Z:${camera.position.z.toFixed(2)}
  `;

  ammoUI.innerText = `Ammo: ${ammo} / ${maxAmmo}`;

  renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
