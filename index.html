<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS ADVANCED BUILD</title>

<style>
body{margin:0;overflow:hidden;background:#87cfff;}

#crosshair{
position:absolute;top:50%;left:50%;
width:10px;height:10px;
transform:translate(-50%,-50%);
z-index:10;
}
#crosshair:before,#crosshair:after{
content:"";position:absolute;background:white;
}
#crosshair:before{width:2px;height:10px;left:4px;}
#crosshair:after{width:10px;height:2px;top:4px;}

#coords{
position:absolute;bottom:10px;right:10px;
color:white;font-family:Arial;font-size:13px;
background:rgba(0,0,0,0.4);
padding:6px;border-radius:6px;
white-space:pre;
}

#healthBar{
position:absolute;bottom:10px;left:10px;
width:220px;height:18px;
border:2px solid white;
background:rgba(0,0,0,0.3);
}
#healthFill{width:100%;height:100%;background:#1e90ff;}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>
<div id="healthBar"><div id="healthFill"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= CORE =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87cfff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= GROUND =================
const tex=new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/terrain/grasslight-big.jpg"
);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
tex.repeat.set(80,80);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({map:tex})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ================= PLAYER =================
const player=new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2.2,0);

// ================= INPUT =================
const keys={};
let yaw=0,pitch=0;
let velY=0,onGround=false;
let aiming=false;

window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// LOOK
document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement!==document.body)return;

yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
pitch=Math.max(-1.2,Math.min(1.2,pitch));

player.rotation.y=yaw;
camera.rotation.x=pitch;
});
document.body.addEventListener("click",()=>document.body.requestPointerLock());

// ================= GRAVITY =================
window.addEventListener("keydown",(e)=>{
if(e.code==="Space"&&onGround){
velY=0.25;
onGround=false;
}
});

function gravity(){
velY-=0.015;
player.position.y+=velY;
if(player.position.y<=0){
player.position.y=0;
velY=0;
onGround=true;
}
}

// ================= MODELS =================
const loader=new THREE.GLTFLoader();
let collidables=[];

function addModel(url,x,y,z,s=1){
loader.load(url,g=>{
const o=g.scene;
o.scale.set(s,s,s);
o.position.set(x,y,z);
scene.add(o);

o.userData.box=new THREE.Box3();
collidables.push(o);
});
}

// ================= EXAMPLES =================
addModel("barrier.glb",0,-50,0,1);
addModel("barrier.glb",-20,-50,0,1);
addModel("barrier.glb",20,-50,0,1);
addModel("brick.glb", -11, 0, -25, 1);
addModel("brick.glb", 1, 0, -26.50, 1);
addModel("brick.glb", 13, 0, -25, 1);
// ================= PLAYER BOX =================
function box(pos){
return new THREE.Box3().setFromCenterAndSize(
new THREE.Vector3(pos.x,pos.y+1,pos.z),
new THREE.Vector3(0.8,2,0.8)
);
}

// ================= MOVEMENT + SLOPE =================
const ray=new THREE.Raycaster();

function groundY(x,z){
ray.set(new THREE.Vector3(x,100,z),new THREE.Vector3(0,-1,0));
const h=ray.intersectObject(ground);
return h.length?h[0].point.y:0;
}

function move(){

const speed=0.15;

let dir=new THREE.Vector3();
if(keys["w"])dir.z-=1;
if(keys["s"])dir.z+=1;
if(keys["a"])dir.x-=1;
if(keys["d"])dir.x+=1;
dir.normalize();

const forward=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y=0;forward.normalize();

const right=new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

const move=new THREE.Vector3();
move.addScaledVector(forward,dir.z*speed);
move.addScaledVector(right,dir.x*speed);

const next=player.position.clone().add(move);

// 🔥 SLOPE SYSTEM
const gy=groundY(next.x,next.z);
const slope=gy-player.position.y;

// block too steep climb
if(slope>1.2)return;

// apply ground snap
next.y=gy;

let blocked=false;

const pb=box(next);

for(let o of collidables){
o.userData.box.setFromObject(o);
if(pb.intersectsBox(o.userData.box))blocked=true;
}

if(!blocked){
player.position.copy(next);
}
}

// ================= ENEMY =================
let enemies=[];

function addEnemy(x,y,z){
const e=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff0000})
);
e.position.set(x,y,z);
scene.add(e);
enemies.push(e);
}

addEnemy(5,1,-20);

// ================= SHOOT =================
const raycaster=new THREE.Raycaster();

function shoot(){
raycaster.setFromCamera(new THREE.Vector2(0,0),camera);

const hit=raycaster.intersectObjects(enemies);

if(hit.length){
let e=hit[0].object;
e.health=(e.health||100)-25;
if(e.health<=0){
scene.remove(e);
enemies=enemies.filter(x=>x!==e);
}
}
}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
gravity();

camera.position.y+=(2.2+player.position.y-camera.position.y)*0.15;

// ADS
const tf=aiming?28:75;
camera.fov+=(tf-camera.fov)*0.15;
camera.updateProjectionMatrix();

// coords
document.getElementById("coords").innerText=
`X:${player.position.x.toFixed(2)}
Y:${player.position.y.toFixed(2)}
Z:${player.position.z.toFixed(2)}`;

document.getElementById("healthFill").style.width="100%";

renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
